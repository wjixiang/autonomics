[workspace]
resolver = "3"
members = ["crates/agentik-sdk", "crates/agentik-types", "crates/agentik-api", "crates/agentik-core", "crates/agentik-proc", "crates/agentik-runtime", "crates/agentik-tui", "crates/agentik-app", "crates/agentik-tools", "crates/agentik-skill", "crates/agentik-skill-proto", "crates/agentik-skill-server", "crates/agentik-skill-client", "crates/agentik-control-client"]

[workspace.package]
edition = "2024"
license = "MIT"
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"


# Suppress unused-warnings for the public-API workspace.dependencies that
# the umbrella doesn't directly import. Keep this list as a hint for
# future members; do not delete entries just because a single member
# doesn't use them.
[workspace.lints.rust]
unused_imports = "allow"
