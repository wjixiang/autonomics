[package]
name = "agentik-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Multi-agent process runtime for agentik."

[dependencies]
agentik-core = { path = "../agentik-core" }
agentik-skill = { path = "../agentik-skill" }
agentik-skill-client = { path = "../agentik-skill-client" }
agentik-skill-server = { path = "../agentik-skill-server" }
agentik-sdk = { path = "../agentik-sdk" }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time", "net"] }
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["rt"] }
uuid = { version = "1.12", features = ["v4"] }
thiserror = "2"
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = "0.1"

[lints]
workspace = true

[dev-dependencies]
tempfile = "3"
